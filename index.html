<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Coding waiting time Killer</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            /* critical for mobile */
            border: none;
            display: block;
        }

        /* Optional: A floating refresh button so they don't have to use browser refresh */
        #refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            z-index: 9999;
            backdrop-filter: blur(5px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #refresh-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        #timer {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 300;
            z-index: 10000;
            user-select: none;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

    <div id="timer">00:00</div>

    <!-- The Game Screen -->
    <iframe id="game-frame" src=""></iframe>

    <!-- Floating Refresh Button -->
    <div id="refresh-btn" onclick="loadRandomGame()">↻</div>

    <script>
        // List your game files here
        const games = [
            'game1.html', // The Physics Ball
            'game2.html', // Connect the Dots
            'game3.html', // Infinite Bubble Wrap
            'game4.html', // Memory Card Match
            'game5.html', // Whack-a-Mole
            'game6.html'  // Simon Says
        ];

        function loadRandomGame() {
            const frame = document.getElementById('game-frame');

            // Pick a random game
            let nextGame = games[Math.floor(Math.random() * games.length)];

            // Optional: Prevent loading the same game twice in a row
            // (Unless you only have 1 game right now)
            if (games.length > 1 && frame.getAttribute('src') === nextGame) {
                loadRandomGame();
                return;
            }

            frame.src = nextGame;
        }

        // Load one immediately on startup
        loadRandomGame();

        // --- TIMER & AUDIO LOGIC ---
        const timerElement = document.getElementById('timer');
        let startTime = Date.now();
        let lastMinutePlayed = 0;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                // Play silent sound to trigger state change
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playChime() {
            if (!audioCtx) return;

            // Create a "magical" chord - combined from game1/3 logic
            const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C Major chord
            const now = audioCtx.currentTime;

            frequencies.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine'; // Sine is cleanest for UI sounds
                osc.frequency.value = freq;

                // Stagger start times slightly for a "strum" effect
                const start = now + (index * 0.05);

                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.1, start + 0.05); // Attack
                gain.gain.exponentialRampToValueAtTime(0.001, start + 2.0); // Long tail

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(start);
                osc.stop(start + 2.5);
            });

            if (navigator.vibrate) navigator.vibrate(200);
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);

            // Format mm:ss
            const minutes = Math.floor(diff / 60);
            const seconds = diff % 60;
            const formatted =
                (minutes < 10 ? "0" + minutes : minutes) + ":" +
                (seconds < 10 ? "0" + seconds : seconds);

            if (timerElement) timerElement.textContent = formatted;

            // Check for minute chime
            if (minutes > 0 && minutes > lastMinutePlayed) {
                playChime();
                lastMinutePlayed = minutes;
            }

            requestAnimationFrame(updateTimer);
        }

        // Initialize audio on interactions
        ['click', 'touchstart', 'keydown'].forEach(e => 
            window.addEventListener(e, initAudio, { once: true })
        );
        
        // Also attach to refresh button specifically
        document.getElementById('refresh-btn').addEventListener('click', initAudio);

        // Start timer loop
        requestAnimationFrame(updateTimer);
    </script>
</body>

</html>
