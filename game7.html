<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaction Time</title>
    <style>
        :root {
            --bg-wait: #2c3e50;
            --bg-ready: #e74c3c;
            --bg-go: #2ecc40;
            --bg-result: #3498db;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-wait);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            transition: background-color 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #score-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-size: 1rem;
            color: #333;
            z-index: 100;
            pointer-events: none;
        }

        #main-text {
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            padding: 0 20px;
        }

        #sub-text {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-top: 15px;
            padding: 0 20px;
        }

        #reaction-time {
            font-size: clamp(3rem, 12vw, 6rem);
            color: white;
            font-weight: bold;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            display: none;
        }

        #reaction-time span {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 300;
        }

        #stats {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
        }

        #hint {
            position: fixed;
            bottom: 80px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="score-container">Attempts: 0</div>

    <div id="main-text">Tap to start</div>
    <div id="sub-text">Test your reaction speed</div>
    <div id="reaction-time"></div>

    <div id="stats">
        <div class="stat-item">
            <div class="stat-value" id="best-time">—</div>
            <div>Best</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="avg-time">—</div>
            <div>Average</div>
        </div>
    </div>

    <div id="hint">Tap when the screen turns green!</div>

    <script>
        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const reactionDisplay = document.getElementById('reaction-time');
        const scoreDisplay = document.getElementById('score-container');
        const bestTimeDisplay = document.getElementById('best-time');
        const avgTimeDisplay = document.getElementById('avg-time');

        let state = 'idle'; // idle, waiting, ready, result
        let startTime = 0;
        let waitTimeout = null;
        let attempts = 0;
        let bestTime = Infinity;
        let totalTime = 0;
        let times = [];

        // --- Audio Context Setup ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // --- Sound: Go (screen turns green) ---
        function playGoSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- Sound: Tap Result ---
        function playTapSound(reactionMs) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const freq = Math.max(200, Math.min(1200, 1200 - reactionMs * 2));
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        // --- Sound: Too Early ---
        function playTooEarlySound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);

            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        // --- State Machine ---
        function handleTap() {
            switch (state) {
                case 'idle':
                case 'result':
                    startWaiting();
                    break;

                case 'waiting':
                    tooEarly();
                    break;

                case 'ready':
                    recordReaction();
                    break;
            }
        }

        function startWaiting() {
            state = 'waiting';
            document.body.style.backgroundColor = 'var(--bg-ready)';
            mainText.textContent = 'Wait for green...';
            subText.textContent = '';
            reactionDisplay.style.display = 'none';

            const delay = 1000 + Math.random() * 4000;
            waitTimeout = setTimeout(() => {
                state = 'ready';
                document.body.style.backgroundColor = 'var(--bg-go)';
                mainText.textContent = 'TAP NOW!';
                startTime = performance.now();
                playGoSound();
            }, delay);
        }

        function tooEarly() {
            clearTimeout(waitTimeout);
            state = 'result';
            document.body.style.backgroundColor = 'var(--bg-wait)';
            mainText.textContent = 'Too early!';
            subText.textContent = 'Tap to try again';
            reactionDisplay.style.display = 'none';
            playTooEarlySound();

            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        }

        function recordReaction() {
            const reactionMs = Math.round(performance.now() - startTime);
            state = 'result';
            attempts++;

            document.body.style.backgroundColor = 'var(--bg-result)';
            mainText.textContent = '';
            subText.textContent = 'Tap to try again';
            reactionDisplay.style.display = 'block';
            reactionDisplay.innerHTML = reactionMs + '<span> ms</span>';

            scoreDisplay.textContent = `Attempts: ${attempts}`;

            times.push(reactionMs);
            if (reactionMs < bestTime) bestTime = reactionMs;
            totalTime += reactionMs;

            bestTimeDisplay.textContent = bestTime + ' ms';
            avgTimeDisplay.textContent = Math.round(totalTime / times.length) + ' ms';

            playTapSound(reactionMs);
            if (navigator.vibrate) navigator.vibrate(15);
        }

        // --- Event Listeners ---
        document.body.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleTap();
        });

    </script>
</body>

</html>
