<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whack-a-Mole</title>
    <style>
        :root {
            --bg-color: #2d5a27;
            --hole-color: #1a3a15;
            --mole-color: #8B6914;
            --mole-nose: #ff6b6b;
            --hit-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 30%, var(--bg-color) 30%, #1e4d1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #score-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            z-index: 100;
            pointer-events: none;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 400px;
            width: 90vw;
        }

        .hole {
            position: relative;
            width: 100%;
            padding-bottom: 80%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .hole-bg {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 40%;
            background: var(--hole-color);
            border-radius: 50%;
            z-index: 2;
        }

        .mole {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 65%;
            height: 70%;
            transition: transform 0.15s ease-out;
            z-index: 1;
            pointer-events: none;
        }

        .mole.active {
            transform: translateX(-50%) translateY(10%);
        }

        .mole.hit {
            transform: translateX(-50%) translateY(10%) scale(0.8);
        }

        .mole-body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 30%, #c9a043, var(--mole-color));
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .mole-eye {
            position: absolute;
            width: 18%;
            height: 22%;
            background: white;
            border-radius: 50%;
            top: 28%;
        }

        .mole-eye::after {
            content: '';
            position: absolute;
            width: 55%;
            height: 55%;
            background: #333;
            border-radius: 50%;
            top: 25%;
            left: 25%;
        }

        .mole-eye.left {
            left: 22%;
        }

        .mole-eye.right {
            right: 22%;
        }

        .mole-nose {
            position: absolute;
            width: 22%;
            height: 16%;
            background: var(--mole-nose);
            border-radius: 50%;
            top: 48%;
            left: 50%;
            transform: translateX(-50%);
        }

        .mole.hit .mole-eye::after {
            width: 80%;
            height: 15%;
            top: 45%;
            left: 10%;
            border-radius: 2px;
        }

        .hole-front {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 25%;
            background: var(--hole-color);
            border-radius: 50%;
            z-index: 3;
        }

        .hit-effect {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: var(--hit-color);
            font-weight: bold;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hit-effect.show {
            animation: hitPop 0.6s ease-out forwards;
        }

        @keyframes hitPop {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(-20px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-40px) scale(0.8);
            }
        }

        #hint {
            position: fixed;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="score-container">Score: 0</div>

    <div id="game-board"></div>

    <div id="hint">Tap the moles as they pop up!</div>

    <script>
        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score-container');

        let score = 0;
        let activeHoles = new Set();
        let moleTimers = [];
        let spawnInterval = null;

        // --- Audio Context Setup ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // --- Sound: Whack ---
        function playWhackSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const noise = audioCtx.createOscillator();
            const noiseGain = audioCtx.createGain();

            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

            noise.type = 'sawtooth';
            noise.frequency.setValueAtTime(800, audioCtx.currentTime);
            noise.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

            noiseGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.08);
        }

        // --- Sound: Miss ---
        function playMissSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(250, audioCtx.currentTime + 0.15);

            gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- Sound: Pop Up ---
        function playPopUpSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // --- Create Board ---
        function createBoard() {
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.classList.add('hole');
                hole.dataset.index = i;

                hole.innerHTML = `
                    <div class="mole">
                        <div class="mole-body">
                            <div class="mole-eye left"></div>
                            <div class="mole-eye right"></div>
                            <div class="mole-nose"></div>
                        </div>
                    </div>
                    <div class="hole-bg"></div>
                    <div class="hole-front"></div>
                    <div class="hit-effect">+1</div>
                `;

                hole.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    handleWhack(hole, i);
                });

                board.appendChild(hole);
            }
        }

        // --- Whack Handler ---
        function handleWhack(hole, index) {
            const mole = hole.querySelector('.mole');
            const hitEffect = hole.querySelector('.hit-effect');

            if (activeHoles.has(index)) {
                // Hit!
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                activeHoles.delete(index);

                mole.classList.add('hit');
                playWhackSound();

                if (navigator.vibrate) navigator.vibrate(30);

                // Show hit effect
                hitEffect.classList.remove('show');
                void hitEffect.offsetWidth;
                hitEffect.classList.add('show');

                setTimeout(() => {
                    mole.classList.remove('active', 'hit');
                }, 200);
            } else {
                playMissSound();
            }
        }

        // --- Pop Up a Random Mole ---
        function popUpMole() {
            const holes = document.querySelectorAll('.hole');
            const available = [];

            for (let i = 0; i < 9; i++) {
                if (!activeHoles.has(i)) {
                    available.push(i);
                }
            }

            if (available.length === 0) return;

            const idx = available[Math.floor(Math.random() * available.length)];
            const mole = holes[idx].querySelector('.mole');

            activeHoles.add(idx);
            mole.classList.add('active');
            playPopUpSound();

            // Mole hides after a random duration
            const hideDelay = 800 + Math.random() * 1200;
            const timer = setTimeout(() => {
                if (activeHoles.has(idx)) {
                    activeHoles.delete(idx);
                    mole.classList.remove('active', 'hit');
                }
            }, hideDelay);

            moleTimers.push(timer);
        }

        // --- Start Spawning Moles ---
        function startGame() {
            function scheduleNext() {
                const delay = 400 + Math.random() * 800;
                spawnInterval = setTimeout(() => {
                    popUpMole();

                    // Occasionally pop two moles at once
                    if (Math.random() < 0.3) {
                        setTimeout(popUpMole, 100);
                    }

                    scheduleNext();
                }, delay);
            }
            scheduleNext();
        }

        // --- Init ---
        createBoard();
        startGame();

    </script>
</body>

</html>
